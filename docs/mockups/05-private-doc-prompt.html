<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mockup — Private Doc Access | Draftmark</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist+Mono:wght@300;400;500&family=Geist:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d0d0d; --surface: #141414; --border: #242424; --border-light: #1e1e1e;
    --text: #e8e6e1; --muted: #5a5a5a; --accent: #c8b89a; --accent-dim: #8a7a66;
    --green: #4a7c59; --green-bright: #6db384; --red: #c45a5a;
  }
  body {
    background: var(--bg); color: var(--text); font-family: 'Geist', sans-serif;
    font-weight: 300; font-size: 15px; line-height: 1.6; min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  nav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 40px; border-bottom: 1px solid var(--border);
    position: sticky; top: 0; background: rgba(13,13,13,0.92);
    backdrop-filter: blur(12px); z-index: 100;
  }
  .logo { font-family: 'Geist Mono', monospace; font-size: 14px; font-weight: 500; color: var(--text); text-decoration: none; letter-spacing: -0.02em; }
  .logo span { color: var(--accent); }
  nav ul { display: flex; gap: 32px; list-style: none; }
  nav ul a { color: var(--muted); text-decoration: none; font-size: 13px; font-family: 'Geist Mono', monospace; transition: color 0.2s; }

  main {
    max-width: 440px; margin: 0 auto; padding: 120px 24px; text-align: center;
  }

  .lock-icon {
    width: 56px; height: 56px; border-radius: 50%;
    background: rgba(200, 184, 154, 0.08); border: 1px solid var(--accent-dim);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 24px; font-size: 24px;
  }

  h1 {
    font-family: 'Instrument Serif', serif; font-size: 26px; font-weight: 400;
    margin-bottom: 8px;
  }

  .subtitle {
    color: var(--muted); font-size: 14px; margin-bottom: 36px; line-height: 1.5;
  }

  .token-form {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 24px; text-align: left;
  }

  label {
    display: block; font-family: 'Geist Mono', monospace; font-size: 11px;
    color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em;
    margin-bottom: 8px;
  }

  .input-row {
    display: flex; gap: 10px;
  }

  input[type="text"] {
    flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
    padding: 10px 14px; color: var(--text); font-family: 'Geist Mono', monospace;
    font-size: 13px; outline: none; transition: border-color 0.2s;
  }
  input[type="text"]:focus { border-color: var(--accent-dim); }
  input[type="text"]::placeholder { color: var(--muted); }

  .btn-primary {
    background: var(--accent); color: var(--bg); border: none; border-radius: 6px;
    padding: 10px 22px; font-family: 'Geist', sans-serif; font-size: 14px;
    font-weight: 500; cursor: pointer; transition: opacity 0.2s; white-space: nowrap;
  }
  .btn-primary:hover { opacity: 0.85; }

  .error-msg {
    margin-top: 12px; font-family: 'Geist Mono', monospace; font-size: 12px;
    color: var(--red); display: none;
  }
  .error-msg.visible { display: block; }

  .hint {
    margin-top: 20px; font-size: 12px; color: var(--muted); line-height: 1.5;
  }
  .hint code {
    font-family: 'Geist Mono', monospace; font-size: 11px;
    background: var(--bg); padding: 1px 5px; border-radius: 3px;
    border: 1px solid var(--border);
  }

  .mockup-label {
    position: fixed; top: 12px; right: 12px; background: #ff6b35; color: #fff;
    font-family: 'Geist Mono', monospace; font-size: 10px; font-weight: 500;
    padding: 4px 10px; border-radius: 4px; text-transform: uppercase;
    letter-spacing: 0.08em; z-index: 200;
  }
</style>
</head>
<body>

<div class="mockup-label">Mockup</div>

<nav>
  <a href="#" class="logo">draft<span>mark</span></a>
  <ul>
    <li><a href="#">docs</a></li>
    <li><a href="#">api</a></li>
    <li><a href="#">github</a></li>
  </ul>
</nav>

<main>
  <div class="lock-icon">&#128274;</div>
  <h1>This document is private</h1>
  <p class="subtitle">You need a magic token to view this document. Paste it below.</p>

  <div class="token-form">
    <label>Magic token</label>
    <div class="input-row">
      <input type="text" placeholder="tok_xxxxxxxx...">
      <button class="btn-primary">View</button>
    </div>
    <div class="error-msg visible">Invalid token. Please check and try again.</div>
  </div>

  <p class="hint">The token was provided when the document was created. You can also access this doc directly via <code>/d/:slug?token=tok_xxx</code></p>
</main>

</body>
</html>
